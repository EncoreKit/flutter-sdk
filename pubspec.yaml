name: encore_flutter_sdk
description: Flutter plugin wrapping the native Encore iOS and Android SDKs for monetization, offers, and entitlements.
version: 1.0.0
homepage: https://github.com/EncoreKit/encore-flutter-sdk

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.encorekit.encore_flutter_sdk
        pluginClass: EncoreFlutterPlugin
      ios:
        pluginClass: EncoreFlutterPlugin
