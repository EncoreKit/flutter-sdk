name: encore
description: >-
  Flutter plugin wrapping the native Encore iOS and Android SDKs for
  monetization, offers, and entitlements. All offer UI is rendered natively
  via StoreKit (iOS) and Play Billing (Android).
version: 1.0.0
homepage: https://encorekit.com
repository: https://github.com/EncoreKit/encore-flutter-sdk
issue_tracker: https://github.com/EncoreKit/encore-flutter-sdk/issues

topics:
  - monetization
  - in-app-purchase
  - subscriptions
  - offers

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.encorekit.encore_flutter_sdk
        pluginClass: EncoreFlutterPlugin
      ios:
        pluginClass: EncoreFlutterPlugin
